  # query-rewriter:
  #   build: .
  #   command: npm run agent:query-rewriter
  #   depends_on: { redis: { condition: service_healthy } }
  #   env_file: .env
  #   environment: { REDIS_URL: "redis://redis:6379" }
  #
  # research:
  #   build: .
  #   command: npm run agent:research
  #   depends_on: { redis: { condition: service_healthy } }
  #   env_file: .env
  #   environment: { REDIS_URL: "redis://redis:6379" }
  #
  # planner:
  #   build: .
  #   command: npm run agent:planner
  #   depends_on: { redis: { condition: service_healthy } }
